<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8">
<title>Fill in the Blanks - Pro Editor</title>
<style>
:root {
--accent: #00d4ff;
--bg: #1e1e24;
--panel: #2a2a32;
--border: #3d3d45;
--neon: #ff00ff;
}
body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
h2 { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
.card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 12px; border-radius: 15px; margin-bottom: 20px; }
label { display: block; font-size: 10px; color: #aaa; text-transform: uppercase; margin-top: 8px; }
input, select, textarea {
width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 8px;
border-radius: 8px; margin-top: 4px; box-sizing: border-box; outline: none; font-size: 13px; 
}
.btn { border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
.btn-main { background: var(--accent); color: #000; }
.btn-code { background: #77dd77; color: #000; }
.btn-blank { background: var(--neon); color: #fff; font-size: 11px; padding: 8px; }
.preview { flex: 1; background: #0c0c0e; display: flex; align-items: center; justify-content: center; padding: 40px; }
#device-wrapper { position: relative; background: transparent; border-radius: 30px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
iframe { width: 100%; height: 100%; border: none; border-radius: 30px; background: transparent; }
#code-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; flex-direction: column; }
#result-code { width: 80%; height: 50%; background: #111; color: var(--accent); padding: 20px; border: 1px solid var(--accent); border-radius: 20px; }
#text-editor { background: #111; border: 1px solid var(--accent); min-height: 100px; padding: 10px; border-radius: 10px; line-height: 1.6; outline: none; margin-bottom: 10px; }
.mark { background: rgba(255, 0, 255, 0.3); border-bottom: 2px solid var(--neon); padding: 0 2px; border-radius: 3px; }
</style></head><body><div class="sidebar">
<div class="sidebar-content">
<h2>1. Настройки Экрана</h2>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
<div><label>Ширина</label><input type="number" id="width" value="800"></div>
<div><label>Высота</label><input type="number" id="height" value="450"></div>
</div>
<label>Фон (URL)</label><input type="text" id="bg-url" placeholder="URL картинки Ghibli">

<h2>2. Контент и Текст</h2>
<div class="card">
<label>Текст задания</label>
<div id="text-editor" contenteditable="true">Ich lerne Deutsch. Das macht Spaß!</div>
<button class="btn btn-blank" onclick="makeBlank()">✨ СДЕЛАТЬ ПРОПУСКОМ</button>
</div>

<h2>3. Дизайн</h2>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
<div><label>Акцент (Неон)</label><input type="color" id="neon-color" value="#ff00ff"></div>
<div><label>Текст</label><input type="color" id="text-color" value="#00d4ff"></div>
</div>
<label>Шрифт</label>
<select id="font-family">
<option value="Segoe UI">Segoe UI</option>
<option value="Indie Flower">Indie Flower</option>
<option value="Montserrat">Montserrat</option>
</select>
<label>Размер шрифта (%)</label>
<input type="range" id="fontSize" min="2" max="10" step="0.1" value="4" oninput="updatePreview()">
</div>

<div style="padding: 20px; border-top: 1px solid var(--border);">
<button class="btn btn-main" onclick="updatePreview()">ОБНОВИТЬ ПРЕВЬЮ</button>
<button class="btn btn-code" onclick="getGeniallyCode()">ПОЛУЧИТЬ КОД</button>
</div></div><div class="preview">
<div id="device-wrapper">
<iframe id="ifr"></iframe>
</div></div><div id="code-modal">
<textarea id="result-code" readonly></textarea>
<button class="btn" onclick="document.getElementById('code-modal').style.display='none'" style="width: 200px; background:#fff; margin-top: 20px;">ЗАКРЫТЬ</button></div><script>
function makeBlank() {
const selection = window.getSelection();
if (!selection.rangeCount || selection.toString().trim() === "") return;
const range = selection.getRangeAt(0);
const span = document.createElement('span');
span.className = 'mark';
span.dataset.answer = selection.toString().trim();
span.textContent = selection.toString().trim();
range.deleteContents();
range.insertNode(span);
}

function buildInnerGame() {
const editor = document.getElementById('text-editor');
const neon = document.getElementById('neon-color').value;
const textColor = document.getElementById('text-color').value;
const font = document.getElementById('font-family').value;
const bg = document.getElementById('bg-url').value;
const fz = document.getElementById('fontSize').value; 

const tempDiv = document.createElement('div');
tempDiv.innerHTML = editor.innerHTML;
tempDiv.querySelectorAll('.mark').forEach(span => {
const input = document.createElement('input');
input.type = 'text';
input.className = 'game-input';
input.placeholder = '...';
input.dataset.correct = span.dataset.answer;
input.style.width = (span.dataset.answer.length * 0.6) + 'em';
span.parentNode.replaceChild(input, span);
});

return `<!DOCTYPE html><html><head><style>
    body { 
        margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
        font-family:'${font}',sans-serif; color:${textColor}; 
        background: url(${bg}) center/cover, #000;
        border: 6px solid ${neon}; box-shadow: inset 0 0 20px ${neon}; border-radius: 30px; box-sizing: border-box;
    }
    #content { font-size: ${fz}vmin; line-height: 1.8; text-align: center; padding: 20px; }
    .game-input {
        background: rgba(255,255,255,0.1); border: none; border-bottom: 2px solid ${neon};
        color: #fff; text-align: center; font-size: inherit; outline: none; margin: 0 5px; 
    }
    .correct { border-bottom: 2px solid #77dd77 !important; color: #77dd77; }
    .btn-check { margin-top: 30px; padding: 1.5vmin 4vmin; border-radius: 20px; border: none; background: ${neon}; color: white; cursor: pointer; font-weight: bold; font-size: 2.5vmin; }
</style></head><body>
    <div id="content">${tempDiv.innerHTML}</div>
    <button class="btn-check" onclick="check()">PRÜFEN</button>
    <script>
        function check() {
            document.querySelectorAll('.game-input').forEach(i => {
                if(i.value.trim().toLowerCase() === i.dataset.correct.toLowerCase()) i.classList.add('correct');
                else { i.classList.remove('correct'); i.style.borderBottomColor = '#f44336'; }
            });
        }
    <\/script>
</body></html>`;
}

function updatePreview() {
const w = document.getElementById('width').value;
const h = document.getElementById('height').value;
const wrapper = document.getElementById('device-wrapper');
wrapper.style.width = w + 'px';
wrapper.style.height = h + 'px';
const scale = Math.min((window.innerWidth - 450) / w, (window.innerHeight - 100) / h);
wrapper.style.transform = `scale(${scale})`; 
document.getElementById('ifr').srcdoc = buildInnerGame();
}

function getGeniallyCode() {
const html = buildInnerGame();
const escaped = html.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); 
const w = document.getElementById('width').value;
const h = document.getElementById('height').value;
document.getElementById('result-code').value = `<iframe width="${w}" height="${h}" srcdoc="${escaped}" frameborder="0" scrolling="no" style="border-radius:30px;" allowtransparency="true"></iframe>`;
document.getElementById('code-modal').style.display = 'flex';
}
window.onload = updatePreview;</script></body></html>
