<div id="exercise-container" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 2px solid #FFD700;">
    <p id="text-passage" style="line-height: 2; font-size: 18px; color: #333;">
        Ich <input type="text" data-answer="bin" class="blank"> ein Lehrer. 
        Das <input type="text" data-answer="ist" class="blank"> mein Buch. 
        Wir <input type="text" data-answer="lernen" class="blank"> Deutsch.
    </p>
    
    <button onclick="checkAnswers()" style="margin-top: 20px; padding: 10px 20px; background: #00d4ff; border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,212,255,0.4);">
        Проверить
    </button>
    
    <p id="result-msg" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<style>
    .blank {
        border: none;
        border-bottom: 2px dashed #666;
        background: transparent;
        width: 100px;
        text-align: center;
        font-size: 18px;
        outline: none;
        color: #555;
    }
    .correct {
        border-bottom: 2px solid #28a745 !important;
        color: #28a745 !important;
        font-weight: bold;
    }
    .incorrect {
        border-bottom: 2px solid #dc3545 !important;
        color: #dc3545 !important;
    }
</style>

<script>
function checkAnswers() {
    const inputs = document.querySelectorAll('.blank');
    let correctCount = 0;
    
    inputs.forEach(input => {
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = input.getAttribute('data-answer').toLowerCase();
        
        if (userAnswer === correctAnswer) {
            input.classList.remove('incorrect');
            input.classList.add('correct');
            correctCount++;
        } else {
            input.classList.remove('correct');
            input.classList.add('incorrect');
        }
    });
    
    const result = document.getElementById('result-msg');
    if (correctCount === inputs.length) {
        result.innerHTML = "🎉 Великолепно! Все правильно.";
        result.style.color = "#28a745";
    } else {
        result.innerHTML = "Попробуйте еще раз. Правильно: " + correctCount + " из " + inputs.length;
        result.style.color = "#dc3545";
    }
}
</script>
